name: trusted_time_nts
description: Tamper-proof, high-precision network time for Flutter with optional NTS (RFC 8915) authenticated NTP. Anchored to hardware monotonic clocks to prevent system-time manipulation.
version: 1.0.0
homepage: https://github.com/nick-llewellyn/trusted_time
repository: https://github.com/nick-llewellyn/trusted_time
issue_tracker: https://github.com/nick-llewellyn/trusted_time/issues
documentation: https://pub.dev/documentation/trusted_time_nts/latest/

topics:
  - time
  - ntp
  - security
  - anti-fraud
  - tamper-proof

environment:
  # Floor raised to match `package:nts` (Dart ^3.10 / Flutter >=3.38),
  # which is required for the Native Assets pipeline that bundles its
  # Rust-backed NTS-KE + AEAD-NTP implementation.
  sdk: '^3.10.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  ntp: ^2.0.0
  web: ^1.1.1
  flutter_web_plugins:
    sdk: flutter
  timezone: ^0.11.0
  nts: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.nicklewellyn.trusted_time_nts
        pluginClass: TrustedTimeNtsPlugin
      ios:
        pluginClass: TrustedTimeNtsPlugin
      macos:
        pluginClass: TrustedTimeNtsPlugin
      windows:
        pluginClass: TrustedTimeNtsPlugin
      linux:
        pluginClass: TrustedTimeNtsPlugin
      web:
        pluginClass: TrustedTimeNtsWebPlugin
        fileName: trusted_time_nts_web.dart

